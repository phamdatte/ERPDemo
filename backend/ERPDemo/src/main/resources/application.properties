spring.application.name=ERPDemo

# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5433/erpdb
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.hikari.connection-init-sql=SET timezone = 'Asia/Ho_Chi_Minh'

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JWT ---
app.jwt.secret=${JWT_SECRET:Y2hhbmdlLXRoaXMtc2VjcmV0LWluLXByb2R1Y3Rpb24tcGxlYXNlLXVzZS1hLWxvbmctcmFuZG9tLXN0cmluZw==}
app.jwt.expiration-ms=86400000
app.jwt.header=Authorization
app.jwt.prefix=Bearer

# --- Server ---
server.port=8080
server.servlet.context-path=/api
